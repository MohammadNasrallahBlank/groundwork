name: ci

on:
  push:
  pull_request:

# A newer push to the same ref cancels the in-flight run — saves minutes on
# rapid iteration without ever letting a stale result mask a fresh failure.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      # Windows: force UTF-8 so subprocess capture and file I/O match the
      # encoding= we pin everywhere. Cheap belt-and-suspenders on POSIX too.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      # No stale .pyc can misjudge a commit under mutcheck/bisector oracles.
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v4

      # imgmeasure imports cv2 (opencv-python) at module load; on a headless
      # Linux runner that dlopen fails without libGL + glib. macOS/Windows
      # ship these, so this step is Linux-only.
      - name: Install OpenCV system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      # .python-version pins 3.11; uv provisions it.
      # --frozen: use the committed lock verbatim and fail if it drifted from
      # pyproject.toml, rather than silently re-resolving. CI's job is to catch
      # exactly that drift.
      - name: Sync dependencies (default + dev groups)
        run: uv sync --frozen

      # fastembed (semsearch) downloads a small ONNX model on first use.
      # Cache it so only the first run on a fresh cache key pays the fetch.
      - name: Cache model downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/fastembed
            ~/Library/Caches/huggingface
            ~/AppData/Local/huggingface
          key: models-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            models-${{ runner.os }}-

      # visdiff gates on browser_available() and skips when chromium is
      # absent. Installing it turns those skips into real coverage. On Linux
      # --with-deps also pulls chromium's own system libraries via apt.
      - name: Install Playwright Chromium (Linux)
        if: runner.os == 'Linux'
        run: uv run playwright install --with-deps chromium

      - name: Install Playwright Chromium (macOS/Windows)
        if: runner.os != 'Linux'
        run: uv run playwright install chromium

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v

      - name: Doctor (all tools healthy, self-tests pass)
        run: uv run groundwork doctor

      - name: Manifest lint (all tools well-formed)
        run: uv run groundwork manifest lint
